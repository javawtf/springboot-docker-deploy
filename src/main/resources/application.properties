server.port=8080
spring.application.name=springboot-docker-deploy

# Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Nacos Configuration
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:180.76.228.137:8848}
spring.cloud.nacos.discovery.namespace=${NACOS_NAMESPACE:afc9c05d-add9-4c0b-82a9-aec9d8c7b501}
spring.cloud.nacos.discovery.group=${NACOS_GROUP:DEFAULT_GROUP}

# Nacos Config
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:180.76.228.137:8848}
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:afc9c05d-add9-4c0b-82a9-aec9d8c7b501}
spring.cloud.nacos.config.group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.nacos.config.file-extension=yaml

# Enable Nacos Discovery
spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.config.enabled=true
